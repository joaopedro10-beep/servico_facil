name: servico_facil
description: App de conexão entre clientes e prestadores de serviço autônomo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  # firebase_storage removido — usando Cloudinary (plano gratuito)

  # ── Estado e navegação ───────────────────────────────────────────────────────
  get: ^4.6.6

  # ── Auth social ─────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Imagens ──────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ── Localização ──────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── Armazenamento local ──────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # ── Upload ───────────────────────────────────────────────────────────────────
  http: ^1.2.2

  # ── Notificações locais ──────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Gráficos ─────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Shimmer ──────────────────────────────────────────────────────────────────
  shimmer: ^3.0.0

  # ── Utilitários ──────────────────────────────────────────────────────────────
  intl: ^0.20.2
  equatable: ^2.0.5
  path: ^1.9.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Fonte Poppins — baixe em fonts.google.com e coloque em assets/fonts/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
